<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SearXNG Proxy</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px;
      background: #fff;
      color: #1a1a1a;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0f0f0f; color: #e0e0e0; }
      .result { border-color: #2a2a2a; }
      .result-url { color: #6ab0ff; }
      .result-engines { color: #888; }
      .markdown-panel { background: #1a1a1a; border-color: #333; }
      .search-input { background: #1a1a1a; border-color: #333; color: #e0e0e0; }
      .search-btn { background: #2a5db0; }
      .search-btn:hover { background: #3a6dc0; }
      .load-btn { background: #1a1a1a; border-color: #444; color: #ccc; }
      .load-btn:hover { background: #2a2a2a; }
      .status-text { color: #888; }
      .error { color: #ff6b6b; }
    }

    header { margin-bottom: 24px; }
    header h1 { font-size: 1.4rem; margin-bottom: 16px; font-weight: 600; }

    .search-form { display: flex; gap: 8px; }
    .search-input {
      flex: 1; padding: 10px 14px; font-size: 1rem;
      border: 1px solid #ddd; border-radius: 6px; outline: none;
    }
    .search-input:focus { border-color: #4a90d9; }
    .search-btn {
      padding: 10px 20px; font-size: 1rem; border: none; border-radius: 6px;
      background: #4a90d9; color: #fff; cursor: pointer; font-weight: 500;
    }
    .search-btn:hover { background: #3a7fc9; }
    .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .status-text { font-size: 0.85rem; color: #888; margin: 12px 0 16px; }
    .error { color: #d32f2f; margin: 12px 0; }

    .result {
      border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px;
      margin-bottom: 12px;
    }
    .result-title {
      font-size: 1.05rem; font-weight: 600; margin-bottom: 4px;
    }
    .result-title a { color: inherit; text-decoration: none; }
    .result-title a:hover { text-decoration: underline; }
    .result-url {
      font-size: 0.82rem; color: #1a73e8; font-family: monospace;
      margin-bottom: 8px; word-break: break-all;
    }
    .result-snippet { font-size: 0.92rem; line-height: 1.5; margin-bottom: 10px; color: inherit; opacity: 0.85; }
    .result-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .result-engines { font-size: 0.78rem; color: #999; }
    .result-score { font-size: 0.78rem; color: #999; }

    .load-btn {
      font-size: 0.82rem; padding: 5px 12px; border-radius: 4px;
      border: 1px solid #ccc; background: #f5f5f5; cursor: pointer;
      color: #555; margin-left: auto;
    }
    .load-btn:hover { background: #eee; }
    .load-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .load-btn.loaded { background: #e8f5e9; border-color: #81c784; color: #2e7d32; }

    @media (prefers-color-scheme: dark) {
      .load-btn.loaded { background: #1b3a1b; border-color: #4caf50; color: #81c784; }
    }

    .markdown-panel {
      margin-top: 12px; padding: 16px; border-radius: 6px;
      background: #f8f8f8; border: 1px solid #e0e0e0;
      max-height: 600px; overflow-y: auto; display: none;
    }
    .markdown-panel.open { display: block; }
    .markdown-panel h1, .markdown-panel h2, .markdown-panel h3 { margin: 16px 0 8px; }
    .markdown-panel p { margin: 8px 0; line-height: 1.6; }
    .markdown-panel pre { background: #272822; color: #f8f8f2; padding: 12px; border-radius: 4px; overflow-x: auto; margin: 8px 0; }
    .markdown-panel code { font-family: 'SF Mono', Menlo, monospace; font-size: 0.88em; }
    .markdown-panel ul, .markdown-panel ol { padding-left: 24px; margin: 8px 0; }
    .markdown-panel a { color: #1a73e8; }
    .markdown-panel img { max-width: 100%; }
    .markdown-panel blockquote { border-left: 3px solid #ccc; padding-left: 12px; margin: 8px 0; opacity: 0.8; }

    .auto-toggle {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; color: #888; margin-top: 10px;
    }
    .auto-toggle label { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px; }
    .toggle-track {
      width: 36px; height: 20px; border-radius: 10px; background: #ccc;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-track::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      transition: transform 0.2s;
    }
    .toggle-input { display: none; }
    .toggle-input:checked + .toggle-track { background: #4a90d9; }
    .toggle-input:checked + .toggle-track::after { transform: translateX(16px); }

    @media (prefers-color-scheme: dark) {
      .toggle-track { background: #444; }
    }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #666; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>SearXNG Proxy</h1>
    <form class="search-form" id="searchForm">
      <input class="search-input" id="searchInput" type="text" placeholder="Search..." autofocus autocomplete="off">
      <button class="search-btn" id="searchBtn" type="submit">Search</button>
    </form>
    <div class="auto-toggle">
      <label>
        <input type="checkbox" class="toggle-input" id="autoLoadToggle">
        <span class="toggle-track"></span>
        Auto-load content
      </label>
    </div>
  </header>

  <div id="status"></div>
  <div id="results"></div>

  <script>
    const loadedMarkdown = new Map();
    const panelState = new Map();

    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    searchForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (q) performSearch(q);
    });

    async function performSearch(q) {
      searchBtn.disabled = true;
      statusEl.innerHTML = '<span class="spinner"></span> Searching...';
      resultsEl.innerHTML = '';
      loadedMarkdown.clear();
      panelState.clear();

      try {
        const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Search failed');

        statusEl.innerHTML = `<span class="status-text">${data.count} results in ${data.elapsed_ms}ms</span>`;
        renderResults(data.results);
        if (document.getElementById('autoLoadToggle').checked) {
          autoLoadAll();
        }
      } catch (err) {
        statusEl.innerHTML = `<span class="error">${err.message}</span>`;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function renderResults(results) {
      resultsEl.innerHTML = results.map((r, i) => `
        <div class="result" data-index="${i}">
          <div class="result-title"><a href="${escHtml(r.url)}" target="_blank" rel="noopener">${escHtml(r.title)}</a></div>
          <div class="result-url">${escHtml(r.url)}</div>
          <div class="result-snippet">${escHtml(r.content || '')}</div>
          <div class="result-meta">
            <span class="result-engines">${(r.engines || []).join(', ')}</span>
            ${r.score ? `<span class="result-score">score: ${r.score.toFixed(1)}</span>` : ''}
            <button class="load-btn" data-url="${escAttr(r.url)}" onclick="toggleMarkdown(this)">Load content</button>
          </div>
          <div class="markdown-panel"></div>
        </div>
      `).join('');
    }

    async function toggleMarkdown(btn) {
      const url = btn.dataset.url;
      const panel = btn.closest('.result').querySelector('.markdown-panel');

      if (loadedMarkdown.has(url)) {
        const isOpen = panel.classList.toggle('open');
        btn.textContent = isOpen ? 'Hide content' : 'Show content';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Loading...';

      try {
        const resp = await fetch(`/api/markdown?url=${encodeURIComponent(url)}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Conversion failed');

        loadedMarkdown.set(url, data);
        const html = DOMPurify.sanitize(marked.parse(data.markdown || ''));
        panel.innerHTML = html;
        panel.classList.add('open');
        btn.textContent = 'Hide content';
        btn.classList.add('loaded');
      } catch (err) {
        btn.textContent = 'Retry';
        panel.innerHTML = `<span class="error">${err.message}</span>`;
        panel.classList.add('open');
      } finally {
        btn.disabled = false;
      }
    }

    async function autoLoadAll() {
      const buttons = resultsEl.querySelectorAll('.load-btn:not(.loaded)');
      for (const btn of buttons) {
        if (!document.getElementById('autoLoadToggle').checked) break;
        await toggleMarkdown(btn);
      }
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
