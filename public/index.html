<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SearXNG — Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root {
      --paper: #f5f0e8;
      --paper-dark: #e8e0d0;
      --ink: #1a1614;
      --ink-light: #3d3530;
      --ink-faint: #8a8078;
      --accent: #c0392b;
      --accent-soft: #e74c3c;
      --rule: #d4cdc0;
      --card-bg: #faf7f2;
      --card-hover: #f0ebe3;
      --shadow: rgba(26, 22, 20, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Paper texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.4;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page-container {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* ── Masthead ── */
    .masthead {
      margin-bottom: 40px;
      position: relative;
    }

    .masthead-rule {
      width: 100%;
      height: 1px;
      background: var(--ink);
      margin-bottom: 24px;
    }

    .masthead-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--ink);
    }

    .masthead-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--ink-faint);
    }

    .masthead-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 8px;
    }

    .masthead-nav {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .nav-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--rule);
      border-radius: 2px;
      transition: all 0.2s;
    }
    .nav-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Search Form ── */
    .search-section {
      margin-bottom: 32px;
    }

    .search-form {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--ink);
      transition: border-color 0.2s;
    }
    .search-form:focus-within {
      border-bottom-color: var(--accent);
    }

    .search-input {
      flex: 1;
      padding: 14px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.15rem;
      font-weight: 400;
      background: transparent;
      border: none;
      color: var(--ink);
      outline: none;
    }
    .search-input::placeholder {
      color: var(--ink-faint);
      font-style: italic;
    }

    .search-btn {
      padding: 14px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: transparent;
      border: none;
      border-left: 1px solid var(--rule);
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.2s;
    }
    .search-btn:hover {
      color: var(--accent);
      background: rgba(192, 57, 43, 0.03);
    }

    /* ── Toggles ── */
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 16px 0 24px;
      flex-wrap: wrap;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      cursor: pointer;
      user-select: none;
    }

    .toggle-track {
      width: 28px;
      height: 14px;
      border-radius: 7px;
      border: 1px solid var(--rule);
      background: transparent;
      position: relative;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--ink-faint);
      transition: all 0.2s;
    }
    .toggle-input { display: none; }
    .toggle-input:checked + .toggle-track {
      border-color: var(--accent);
      background: rgba(192, 57, 43, 0.08);
    }
    .toggle-input:checked + .toggle-track::after {
      transform: translateX(14px);
      background: var(--accent);
    }

    .concurrency-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
      margin-left: auto;
      padding: 3px 8px;
      border: 1px solid var(--rule);
      border-radius: 2px;
    }

    /* ── Status ── */
    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      margin: 16px 0 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--rule);
    }
    .status-text .count { color: var(--ink); font-weight: 600; }
    .status-text .elapsed { color: var(--accent); }
    .error { color: var(--accent) !important; }

    /* ── Results ── */
    .result {
      padding: 20px 0;
      border-bottom: 1px solid var(--rule);
      animation: fadeUp 0.3s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .result-title a {
      color: var(--ink);
      text-decoration: none;
      transition: color 0.15s;
    }
    .result-title a:hover {
      color: var(--accent);
    }

    .result-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .result-snippet {
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--ink-light);
      margin-bottom: 10px;
    }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .result-engines {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .result-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      color: var(--ink-faint);
    }

    .load-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink-faint);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      margin-left: auto;
    }
    .load-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
    }
    .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .load-btn.loaded {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Markdown Panel ── */
    .markdown-panel {
      margin-top: 14px;
      padding: 20px;
      background: var(--card-bg);
      border-left: 3px solid var(--accent);
      max-height: 600px;
      overflow-y: auto;
      display: none;
      font-size: 0.95rem;
      line-height: 1.75;
    }
    .markdown-panel.open { display: block; }
    .markdown-panel h1, .markdown-panel h2, .markdown-panel h3 {
      font-family: 'Noto Serif JP', serif;
      font-weight: 600;
      margin: 18px 0 8px;
      color: var(--ink);
    }
    .markdown-panel h1 { font-size: 1.4rem; }
    .markdown-panel h2 { font-size: 1.15rem; }
    .markdown-panel h3 { font-size: 1rem; }
    .markdown-panel p { margin: 10px 0; }
    .markdown-panel a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--rule); text-underline-offset: 2px; }
    .markdown-panel a:hover { text-decoration-color: var(--accent); }
    .markdown-panel pre {
      background: var(--ink);
      color: var(--paper);
      padding: 16px;
      border-radius: 2px;
      overflow-x: auto;
      margin: 12px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .markdown-panel code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      background: var(--paper-dark);
      padding: 2px 6px;
      border-radius: 2px;
    }
    .markdown-panel ul, .markdown-panel ol { padding-left: 24px; margin: 10px 0; }
    .markdown-panel li { margin: 5px 0; }
    .markdown-panel blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 12px 0;
      color: var(--ink-light);
      font-style: italic;
    }
    .markdown-panel img { max-width: 100%; border-radius: 2px; }
    .markdown-panel pre.raw-markdown {
      white-space: pre-wrap;
      word-break: break-word;
      background: transparent;
      color: var(--ink-light);
      padding: 0;
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--ink-faint);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .page-footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--rule);
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--paper); }
    ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page-container { padding: 24px 16px 60px; }
      .masthead-title { font-size: 2rem; }
      .masthead-nav { position: static; justify-content: space-between; margin-bottom: 12px; }
      .result-meta { flex-direction: column; align-items: flex-start; }
      .load-btn { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <header class="masthead">
      <div class="masthead-rule"></div>
      <div class="masthead-nav">
        <a href="/trader" class="nav-link">Trader →</a>
      </div>
      <h1 class="masthead-title">SearXNG<em> proxy</em></h1>
      <div class="masthead-eyebrow">Privacy-respecting metasearch</div>
    </header>

    <section class="search-section">
      <form class="search-form" id="searchForm">
        <input class="search-input" id="searchInput" type="text" placeholder="Search the web..." autofocus autocomplete="off">
        <button class="search-btn" id="searchBtn" type="submit">Search</button>
      </form>
    </section>

    <div class="controls-bar">
      <label class="toggle-item">
        <input type="checkbox" class="toggle-input" id="autoLoadToggle">
        <span class="toggle-track"></span>
        Auto-load
      </label>
      <label class="toggle-item">
        <input type="checkbox" class="toggle-input" id="rawMarkdownToggle">
        <span class="toggle-track"></span>
        Raw MD
      </label>
      <span class="concurrency-badge" id="concurrencyBadge"></span>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <footer class="page-footer">SearXNG Proxy &mdash; Markdown Conversion Engine</footer>
  </div>

  <script>
    const loadedMarkdown = new Map();
    const panelState = new Map();

    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const rawMarkdownToggle = document.getElementById('rawMarkdownToggle');
    const concurrencyBadge = document.getElementById('concurrencyBadge');

    fetch('/api/health').then(r => r.json()).then(h => {
      concurrencyBadge.textContent = 'concurrency: ' + h.markdown_concurrency;
    }).catch(() => { concurrencyBadge.textContent = 'concurrency: ?'; });

    searchForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (q) performSearch(q);
    });

    const autoLoadToggle = document.getElementById('autoLoadToggle');

    autoLoadToggle.addEventListener('change', () => {
      if (autoLoadToggle.checked) autoLoadAll();
    });

    rawMarkdownToggle.addEventListener('change', () => {
      for (const [url, data] of loadedMarkdown) {
        const panel = document.querySelector('.result[data-url="' + CSS.escape(url) + '"] .markdown-panel');
        if (panel) renderPanel(panel, data);
      }
    });

    async function performSearch(q) {
      searchBtn.disabled = true;
      statusEl.innerHTML = '<span class="spinner"></span> Searching...';
      resultsEl.innerHTML = '';
      loadedMarkdown.clear();
      panelState.clear();

      try {
        const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Search failed');

        statusEl.innerHTML =
          '<span class="count">' + data.count + '</span> results in ' +
          '<span class="elapsed">' + data.elapsed_ms + 'ms</span>';
        renderResults(data.results);
        if (autoLoadToggle.checked) {
          autoLoadAll();
        }
      } catch (err) {
        statusEl.innerHTML = '<span class="error">' + escHtml(err.message) + '</span>';
      } finally {
        searchBtn.disabled = false;
      }
    }

    function renderPanel(panel, data) {
      if (rawMarkdownToggle.checked) {
        panel.innerHTML = '<pre class="raw-markdown">' + escHtml(data.markdown || '') + '</pre>';
      } else {
        panel.innerHTML = DOMPurify.sanitize(marked.parse(data.markdown || ''));
      }
    }

    function renderResults(results) {
      resultsEl.innerHTML = results.map((r, i) => {
        const urlId = encodeURIComponent(r.url).replace(/['.]/g, '');
        return (
          '<div class="result" data-url="' + escAttr(r.url) + '" style="animation-delay:' + (Math.min(i, 15) * 0.04) + 's">' +
            '<div class="result-title"><a href="' + escAttr(r.url) + '" target="_blank" rel="noopener">' + escHtml(r.title) + '</a></div>' +
            '<div class="result-url">' + escHtml(r.url) + '</div>' +
            '<div class="result-snippet">' + escHtml(r.content || '') + '</div>' +
            '<div class="result-meta">' +
              '<span class="result-engines">' + (r.engines || []).join(', ') + '</span>' +
              (r.score ? '<span class="result-score">score: ' + r.score.toFixed(1) + '</span>' : '') +
              '<button class="load-btn" data-url="' + escAttr(r.url) + '" onclick="toggleMarkdown(this)">Load content</button>' +
            '</div>' +
            '<div class="markdown-panel"></div>' +
          '</div>'
        );
      }).join('');
    }

    async function toggleMarkdown(btn) {
      const url = btn.dataset.url;
      const result = document.querySelector('.result[data-url="' + CSS.escape(url) + '"]');
      const panel = result ? result.querySelector('.markdown-panel') : null;
      if (!panel) return;

      if (loadedMarkdown.has(url)) {
        const isOpen = panel.classList.toggle('open');
        btn.textContent = isOpen ? 'Hide content' : 'Load content';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Loading...';

      try {
        const resp = await fetch('/api/markdown?url=' + encodeURIComponent(url));
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Conversion failed');

        loadedMarkdown.set(url, data);
        renderPanel(panel, data);
        panel.classList.add('open');
        btn.textContent = 'Hide content';
        btn.classList.add('loaded');
      } catch (err) {
        btn.textContent = 'Retry';
        btn.disabled = false;
        panel.innerHTML = '<span class="error">' + escHtml(err.message) + '</span>';
        panel.classList.add('open');
      }
    }

    async function autoLoadAll() {
      if (!autoLoadToggle.checked) return;

      const buttons = [...resultsEl.querySelectorAll('.load-btn:not(.loaded)')];
      if (buttons.length === 0) return;

      const urls = buttons.map(b => b.dataset.url);
      buttons.forEach(btn => {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Loading...';
      });

      try {
        const resp = await fetch('/api/markdown/batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Batch conversion failed');

        data.results.forEach((result, i) => {
          const btn = buttons[i];
          const panel = btn.closest('.result')?.querySelector('.markdown-panel');
          if (result.error) { btn.textContent = 'Retry'; btn.disabled = false; return; }
          loadedMarkdown.set(result.url, result);
          renderPanel(panel, result);
          panel.classList.add('open');
          btn.textContent = 'Hide content';
          btn.classList.add('loaded');
          btn.disabled = false;
        });
      } catch (err) {
        buttons.forEach(btn => { btn.textContent = 'Retry'; btn.disabled = false; });
        statusEl.innerHTML = '<span class="error">Auto-load failed: ' + escHtml(err.message) + '</span>';
      }
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
